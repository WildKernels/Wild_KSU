name: Build Manager CI

on:
  push:
    branches: [ "wild" ]

permissions:
  contents: write

jobs:
  tag-release:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.create_tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Create Tag
        id: create_tag
        run: |
          git fetch --tags
          # Find the latest tag matching v4.2.0-r*
          LAST_TAG=$(git tag -l "v4.2.0-r*" | sort -V | tail -n1)
          
          if [ -z "$LAST_TAG" ]; then
            NEW_TAG="v4.2.0-r1"
          else
            # Extract number after -r
            # Assuming format v4.2.0-rX
            LAST_VER=$(echo "$LAST_TAG" | sed 's/.*-r//')
            if [[ "$LAST_VER" =~ ^[0-9]+$ ]]; then
               NEXT_VER=$((LAST_VER + 1))
               NEW_TAG="v4.2.0-r$NEXT_VER"
            else
               # Fallback if parsing fails
               NEW_TAG="v4.2.0-r1"
            fi
          fi
          
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Creating tag: $NEW_TAG"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $NEW_TAG
          git push origin $NEW_TAG

  build-lkm:
    needs: tag-release
    uses: ./.github/workflows/build-lkm.yml
    secrets: inherit

  build-ksuinit:
    needs: tag-release
    uses: ./.github/workflows/ksuinit.yml

  build-ksud:
    needs: [tag-release, build-lkm, build-ksuinit]
    strategy:
      matrix:
        include:
          - target: aarch64-linux-android
            os: ubuntu-latest
          - target: x86_64-linux-android
            os: ubuntu-latest
    uses: ./.github/workflows/ksud.yml
    with:
      target: ${{ matrix.target }}
      os: ${{ matrix.os }}

  build-ksud-extra:
    needs: [tag-release, build-lkm, build-ksuinit]
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-gnu # windows pc
            os: ubuntu-latest
          - target: x86_64-apple-darwin # Intel mac
            os: macos-latest
          - target: aarch64-apple-darwin # M chip mac
            os: macos-latest
          - target: aarch64-unknown-linux-musl # arm64 Linux
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl # x86 Linux
            os: ubuntu-latest
    uses: ./.github/workflows/ksud.yml
    with:
      target: ${{ matrix.target }}
      os: ${{ matrix.os }}

  build-manager:
    needs: [tag-release, build-ksud]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        spoofed: [ false, true ]

    defaults:
      run:
        working-directory: ./manager

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Spoof Package ID
        if: matrix.spoofed == true
        run: |
          chmod +x spoof
          ./spoof

      - name: Setup need_upload
        id: need_upload
        run: |
          if [ ! -z "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            echo "UPLOAD=true" >> $GITHUB_OUTPUT
          else
            echo "UPLOAD=false" >> $GITHUB_OUTPUT
          fi

      - name: Write key
        run: |
          if [ ! -z "${{ secrets.KEYSTORE }}" ]; then
            {
              echo KEYSTORE_PASSWORD='${{ secrets.KEYSTORE_PASSWORD }}'
              echo KEY_ALIAS='${{ secrets.KEY_ALIAS }}'
              echo KEY_PASSWORD='${{ secrets.KEY_PASSWORD }}'
              echo KEYSTORE_FILE='key.jks'
            } >> gradle.properties
            echo "${{ secrets.KEYSTORE }}" | base64 -d > key.jks
          fi

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download arm64 ksud
        uses: actions/download-artifact@v7
        with:
          name: ksud-aarch64-linux-android
          path: .

      - name: Download x86_64 ksud
        uses: actions/download-artifact@v7
        with:
          name: ksud-x86_64-linux-android
          path: .

      - name: Copy ksud to app jniLibs
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/x86_64
          cp -f ../aarch64-linux-android/release/ksud ../manager/app/src/main/jniLibs/arm64-v8a/libksud.so
          cp -f ../x86_64-linux-android/release/ksud ../manager/app/src/main/jniLibs/x86_64/libksud.so

      - name: Build with Gradle
        run: ./gradlew clean assembleRelease

      - name: Prepare Artifact
        run: |
          mkdir -p artifact_upload
          cp app/build/outputs/apk/release/*.apk artifact_upload/

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        if: ${{ ( github.event_name != 'pull_request' && (github.ref == 'refs/heads/wild' || github.ref == 'refs/heads/wild-dev')) || github.ref_type == 'tag' }}
        with:
          name: ${{ matrix.spoofed && 'manager-spoofed' || 'manager' }}
          path: manager/artifact_upload/

      - name: Upload mappings
        uses: actions/upload-artifact@v6
        if: ${{ ( github.event_name != 'pull_request' && (github.ref == 'refs/heads/wild' || github.ref == 'refs/heads/wild-dev')) || github.ref_type == 'tag' }}
        with:
          name: ${{ matrix.spoofed && 'mappings-spoofed' || 'mappings' }}
          path: "manager/app/build/outputs/mapping/release/"

  release:
    needs: [tag-release, build-manager, build-lkm, build-ksud, build-ksud-extra]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          
      - name: Download artifacts
        uses: actions/download-artifact@v7

      - name: Rename ksud
        run: |
          mkdir -p ksud
          for dir in ./ksud-*; do
              if [ -d "$dir" ]; then
                 echo "----- Rename $dir -----"
                 ksud_platform_name=$(basename "$dir")
                 find "$dir" -type f -name "ksud" -path "*/release/*" | while read -r ksud_file; do
                   if [ -f "$ksud_file" ]; then
                     mv "$ksud_file" "ksud/$ksud_platform_name"
                   fi
                 done
              fi
          done

      - name: Generate Release Notes
        run: |
           echo "## Wild KSU Testing Release" > RELEASE_NOTES.md
           echo "**Tag:** ${{ needs.tag-release.outputs.tag_name }}" >> RELEASE_NOTES.md
           echo "" >> RELEASE_NOTES.md
           echo "### ⚠️ This release is for testing purposes only." >> RELEASE_NOTES.md
           echo "" >> RELEASE_NOTES.md
           echo "### Changes" >> RELEASE_NOTES.md
           
           # Get previous tag if possible to make log cleaner, else just last 20 commits
           PREV_TAG=$(git describe --tags --abbrev=0 ${{ needs.tag-release.outputs.tag_name }}^ 2>/dev/null || true)
           if [ -z "$PREV_TAG" ]; then
              git log --pretty=format:"* %s (%an)" -n 20 >> RELEASE_NOTES.md
           else
              git log --pretty=format:"* %s (%an)" $PREV_TAG..${{ needs.tag-release.outputs.tag_name }} >> RELEASE_NOTES.md
           fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag-release.outputs.tag_name }}
          body_path: RELEASE_NOTES.md
          prerelease: true
          files: |
            manager/*.apk
            manager-spoofed/*.apk
            *-lkm/*_kernelsu.ko
            ksud/*

  upload-telegram-manager:
    if: ${{ always() && (( github.event_name != 'pull_request' && (github.ref == 'refs/heads/wild' || github.ref == 'refs/heads/wild-dev')) || github.ref_type == 'tag') }}
    needs: build-manager
    runs-on: ubuntu-latest
    steps:
      - name: Download Normal Manager
        if: needs.build-manager.result == 'success'
        uses: actions/download-artifact@v7
        with:
          name: manager
          path: manager

      - name: Download Spoofed Manager
        if: needs.build-manager.result == 'success'
        uses: actions/download-artifact@v7
        with:
          name: manager-spoofed
          path: manager-spoofed

      - name: Send Telegram notification and APKs
        if: needs.build-manager.result == 'success'
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          escape_html() {
            local s="$1"
            s="${s//&/&amp;}"
            s="${s//</&lt;}"
            s="${s//>/&gt;}"
            printf '%s' "$s"
          }

          COMMIT_MESSAGE_ESCAPED="$(escape_html "${COMMIT_MESSAGE}")"
          MESSAGE=$(
            printf '%s\n%s\n%s\n%s\n\n%s\n%s\n' \
            "<b>Repository:</b> <a href=\"https://github.com/${REPO}\">${REPO}</a>" \
            "<b>Branch:</b> <a href=\"https://github.com/${REPO}/tree/${BRANCH}\">${BRANCH}</a>" \
            "<b>Commit:</b> <a href=\"https://github.com/${REPO}/commit/${COMMIT_SHA}\">${COMMIT_SHA:0:7}</a>" \
            "<b>Workflow:</b> <a href=\"https://github.com/${REPO}/actions/runs/${RUN_ID}\">View Run</a>" \
            "<b>Commit Message:</b>" \
            "<pre><code>${COMMIT_MESSAGE_ESCAPED}</code></pre>"
          )

              # Collect APKs
              FILES=()
              # Enable nullglob to handle empty directories
              shopt -s nullglob
              for apk in ./manager/*.apk ./manager-spoofed/*.apk; do
                FILES+=("$apk")
              done
              shopt -u nullglob

              if [ ${#FILES[@]} -eq 0 ]; then
                echo "No APKs to upload."
                exit 0
              fi

              echo "Found ${#FILES[@]} APKs to upload."

              for apk in "${FILES[@]}"; do
                 apk="${apk//$'\r'/}"
                 if [[ "$apk" == *"manager-spoofed"* ]]; then
                     TYPE="Spoofed"
                 else
                     TYPE="Normal"
                 fi
 
                 APK_NAME_ESCAPED="$(escape_html "$(basename "$apk")")"

                 FULL_CAPTION="$(printf '%s\n\n%s' "<b>${TYPE}:</b> ${APK_NAME_ESCAPED}" "${MESSAGE}")"

                 echo "Uploading $apk ($TYPE)..."
                 if [ ! -f "$apk" ]; then
                   echo "Missing file: $apk"
                   ls -la "$(dirname "$apk")" || true
                   exit 1
                 fi
                 curl -sS "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
                   --form-string "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
                   --form-string "message_thread_id=${{ secrets.TELEGRAM_TOPIC_ID_WKSU }}" \
                   --form "document=@${apk}" \
                   --form-string "caption=${FULL_CAPTION}" \
                   --form-string "parse_mode=HTML"
              done

              echo "All uploads completed successfully."

      - name: DM Artifacts
        if: needs.build-manager.result == 'success'
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          escape_html() {
            local s="$1"
            s="${s//&/&amp;}"
            s="${s//</&lt;}"
            s="${s//>/&gt;}"
            printf '%s' "$s"
          }

          COMMIT_MESSAGE_ESCAPED="$(escape_html "${COMMIT_MESSAGE}")"

          MESSAGE=$(
            printf '%s\n%s\n%s\n%s\n\n%s\n%s\n' \
            "<b>Repository:</b> <a href=\"https://github.com/${REPO}\">${REPO}</a>" \
            "<b>Branch:</b> <a href=\"https://github.com/${REPO}/tree/${BRANCH}\">${BRANCH}</a>" \
            "<b>Commit:</b> <a href=\"https://github.com/${REPO}/commit/${COMMIT_SHA}\">${COMMIT_SHA:0:7}</a>" \
            "<b>Workflow:</b> <a href=\"https://github.com/${REPO}/actions/runs/${RUN_ID}\">View Run</a>" \
            "<b>Commit Message:</b>" \
            "<pre><code>${COMMIT_MESSAGE_ESCAPED}</code></pre>"
          )

          FILES=()
          shopt -s nullglob
          for apk in ./manager/*.apk ./manager-spoofed/*.apk; do
            FILES+=("$apk")
          done
          shopt -u nullglob

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No APKs to DM."
            exit 0
          fi

          for apk in "${FILES[@]}"; do
            apk="${apk//$'\r'/}"
            if [[ "$apk" == *"manager-spoofed"* ]]; then
              TYPE="Spoofed"
            else
              TYPE="Normal"
            fi
 
            APK_NAME_ESCAPED="$(escape_html "$(basename "$apk")")"

            FULL_CAPTION="$(printf '%s\n\n%s' "<b>${TYPE}:</b> ${APK_NAME_ESCAPED}" "${MESSAGE}")"

            echo "Sending $apk ($TYPE) to Telegram DM..."
            curl -sS "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
              --form-string "chat_id=${{ secrets.TELEGRAM_USER_ID }}" \
              --form "document=@${apk}" \
              --form-string "caption=${FULL_CAPTION}" \
              --form-string "parse_mode=HTML"
          done

      - name: DM Failure Notification
        if: needs.build-manager.result == 'failure'
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          MESSAGE=$(
            printf '%s\n\n%s\n%s\n%s\n%s\n\n%s\n%s\n' \
            "<b>Wild KSU Build Failed</b> 🔴" \
            "<b>Repository:</b> <a href=\"https://github.com/${REPO}\">${REPO}</a>" \
            "<b>Branch:</b> <a href=\"https://github.com/${REPO}/tree/${BRANCH}\">${BRANCH}</a>" \
            "<b>Commit:</b> <a href=\"https://github.com/${REPO}/commit/${COMMIT_SHA}\">${COMMIT_SHA:0:7}</a>" \
            "<b>Workflow:</b> <a href=\"https://github.com/${REPO}/actions/runs/${RUN_ID}\">View Run</a>" \
            "<b>Commit Message:</b>" \
            "${COMMIT_MESSAGE}"
          )

          echo "Sending Failure Notification..."
          curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_USER_ID }}" \
            -d parse_mode="HTML" \
            --data-urlencode "text=$MESSAGE"
