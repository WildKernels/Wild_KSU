name: Build Manager CI

on:
  push:
    branches: [ "wild", "wild-dev" ]
    paths:
      - '.github/workflows/build-manager-ci.yml'
      - '.github/workflows/build-manager.yml'
      - '.github/workflows/build-lkm.yml'
      - '.github/workflows/ksud.yml'
      - 'manager/**'
      - 'kernel/**'
      - 'userspace/**'
  pull_request:
    branches: [ "wild", "wild-dev" ]
    paths:
      - '.github/workflows/build-manager-ci.yml'
      - '.github/workflows/build-manager.yml'
      - '.github/workflows/build-lkm.yml'
      - '.github/workflows/ksud.yml'
      - 'manager/**'
      - 'kernel/**'
      - 'userspace/**'
  workflow_call:
  workflow_dispatch:

jobs:
  build-lkm:
    uses: ./.github/workflows/build-lkm.yml
    secrets: inherit

  build-ksuinit:
    uses: ./.github/workflows/ksuinit.yml

  build-ksud:
    needs: [build-lkm, build-ksuinit]
    strategy:
      matrix:
        include:
          - target: aarch64-linux-android
            os: ubuntu-latest
          - target: x86_64-linux-android
            os: ubuntu-latest
    uses: ./.github/workflows/ksud.yml
    with:
      target: ${{ matrix.target }}
      os: ${{ matrix.os }}

  build-ksud-extra:
    needs: [build-lkm, build-ksuinit]
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-gnu # windows pc
            os: ubuntu-latest
          - target: x86_64-apple-darwin # Intel mac
            os: macos-latest
          - target: aarch64-apple-darwin # M chip mac
            os: macos-latest
          - target: aarch64-unknown-linux-musl # arm64 Linux
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl # x86 Linux
            os: ubuntu-latest
    uses: ./.github/workflows/ksud.yml
    with:
      target: ${{ matrix.target }}
      os: ${{ matrix.os }}

  build-manager:
    needs: build-ksud
    runs-on: ubuntu-latest
    strategy:
      matrix:
        spoofed: [ false, true ]

    defaults:
      run:
        working-directory: ./manager

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Spoof Package ID
        if: matrix.spoofed == true
        run: |
          chmod +x spoof
          ./spoof

      - name: Setup need_upload
        id: need_upload
        run: |
          if [ ! -z "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            echo "UPLOAD=true" >> $GITHUB_OUTPUT
          else
            echo "UPLOAD=false" >> $GITHUB_OUTPUT
          fi

      - name: Write key
        run: |
          if [ ! -z "${{ secrets.KEYSTORE }}" ]; then
            {
              echo KEYSTORE_PASSWORD='${{ secrets.KEYSTORE_PASSWORD }}'
              echo KEY_ALIAS='${{ secrets.KEY_ALIAS }}'
              echo KEY_PASSWORD='${{ secrets.KEY_PASSWORD }}'
              echo KEYSTORE_FILE='key.jks'
            } >> gradle.properties
            echo "${{ secrets.KEYSTORE }}" | base64 -d > key.jks
          fi

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download arm64 ksud
        uses: actions/download-artifact@v6
        with:
          name: ksud-aarch64-linux-android
          path: .

      - name: Download x86_64 ksud
        uses: actions/download-artifact@v6
        with:
          name: ksud-x86_64-linux-android
          path: .

      - name: Copy ksud to app jniLibs
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/x86_64
          cp -f ../aarch64-linux-android/release/ksud ../manager/app/src/main/jniLibs/arm64-v8a/libksud.so
          cp -f ../x86_64-linux-android/release/ksud ../manager/app/src/main/jniLibs/x86_64/libksud.so

      - name: Build with Gradle
        run: ./gradlew clean assembleRelease

      - name: Prepare Artifact
        run: |
          mkdir -p artifact_upload
          cp app/build/outputs/apk/release/*.apk artifact_upload/

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        if: ${{ ( github.event_name != 'pull_request' && (github.ref == 'refs/heads/wild' || github.ref == 'refs/heads/wild-dev')) || github.ref_type == 'tag' }}
        with:
          name: ${{ matrix.spoofed && 'manager-spoofed' || 'manager' }}
          path: manager/artifact_upload/

      - name: Upload mappings
        uses: actions/upload-artifact@v5
        if: ${{ ( github.event_name != 'pull_request' && (github.ref == 'refs/heads/wild' || github.ref == 'refs/heads/wild-dev')) || github.ref_type == 'tag' }}
        with:
          name: ${{ matrix.spoofed && 'mappings-spoofed' || 'mappings' }}
          path: "manager/app/build/outputs/mapping/release/"



  upload-telegram-manager:
    if: ${{ always() && (( github.event_name != 'pull_request' && (github.ref == 'refs/heads/wild' || github.ref == 'refs/heads/wild-dev')) || github.ref_type == 'tag') }}
    needs: build-manager
    runs-on: ubuntu-latest
    steps:
      - name: Download Normal Manager
        if: needs.build-manager.result == 'success'
        uses: actions/download-artifact@v6
        with:
          name: manager
          path: manager

      - name: Download Spoofed Manager
        if: needs.build-manager.result == 'success'
        uses: actions/download-artifact@v6
        with:
          name: manager-spoofed
          path: manager-spoofed

      - name: Send Telegram notification and APKs
        if: needs.build-manager.result == 'success'
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          MESSAGE=$(cat <<EOF
          <b>Wild KSU Build Success</b> 🟢

          <b>Repository:</b> ${REPO}
          <b>Branch:</b> ${BRANCH}
          <b>Commit:</b> <a href="https://github.com/${REPO}/commit/${COMMIT_SHA}">${COMMIT_SHA:0:7}</a>
          <b>Workflow:</b> <a href="https://github.com/${REPO}/actions/runs/${RUN_ID}">View Run</a>

          <b>Commit Message:</b>
          ${COMMIT_MESSAGE}
          EOF
              )

              echo "Sending Telegram message..."
              RESPONSE=$(curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
                -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
                -d message_thread_id="${{ secrets.TELEGRAM_TOPIC_ID_WKSU }}" \
                -d parse_mode="HTML" \
                --data-urlencode "text=$MESSAGE")

              echo "$RESPONSE" | grep -q '"ok":true'
              echo "Message sent."

              # Collect APKs
              FILES=()
              # Enable nullglob to handle empty directories
              shopt -s nullglob
              for apk in ./manager/*.apk ./manager-spoofed/*.apk; do
                FILES+=("$apk")
              done
              shopt -u nullglob

              if [ ${#FILES[@]} -eq 0 ]; then
                echo "No APKs to upload."
                exit 0
              fi

              echo "Found ${#FILES[@]} APKs to upload."

              if [ ${#FILES[@]} -eq 1 ]; then
                echo "Uploading single APK: ${FILES[0]}"
                curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
                  -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
                  -F message_thread_id="${{ secrets.TELEGRAM_TOPIC_ID_WKSU }}" \
                  -F document=@"${FILES[0]}"
              else
                echo "Uploading APKs as album..."
                MEDIA_GROUP="["
                CURL_ARGS=()
                for i in "${!FILES[@]}"; do
                   FILE="${FILES[$i]}"
                   NAME="file$i"
                   # Add comma if not first
                   if [ $i -gt 0 ]; then MEDIA_GROUP="$MEDIA_GROUP,"; fi
                   MEDIA_GROUP="$MEDIA_GROUP{\"type\":\"document\",\"media\":\"attach://$NAME\"}"
                   CURL_ARGS+=("-F" "$NAME=@$FILE")
                done
                MEDIA_GROUP="$MEDIA_GROUP]"

                curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMediaGroup" \
                  -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
                  -F message_thread_id="${{ secrets.TELEGRAM_TOPIC_ID_WKSU }}" \
                  -F media="$MEDIA_GROUP" \
                  "${CURL_ARGS[@]}"
              fi

              echo "All uploads completed successfully."

      - name: DM Artifacts
        if: needs.build-manager.result == 'success'
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          MESSAGE=$(cat <<EOF
          <b>Wild KSU Build Success</b> 🟢

          <b>Repository:</b> ${REPO}
          <b>Branch:</b> ${BRANCH}
          <b>Commit:</b> <a href="https://github.com/${REPO}/commit/${COMMIT_SHA}">${COMMIT_SHA:0:7}</a>
          <b>Workflow:</b> <a href="https://github.com/${REPO}/actions/runs/${RUN_ID}">View Run</a>

          <b>Commit Message:</b>
          ${COMMIT_MESSAGE}
          EOF
              )
          # Check for Normal artifacts
          for apk in ./manager/*.apk; do
            if [ -f "$apk" ]; then
              echo "Sending Telegram message..."
              curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
                -d chat_id="${{ secrets.TELEGRAM_USER_ID }}" \
                -d parse_mode="HTML" \
                --data-urlencode "text=$MESSAGE"

              echo "Sending $apk to Telegram DM..."
              curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
                  -F chat_id="${{ secrets.TELEGRAM_USER_ID }}" \
                  -F document=@"$apk" \
                  -F caption="📦 Build: $(basename "$apk")"
            fi
          done

      - name: DM Failure Notification
        if: needs.build-manager.result == 'failure'
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          MESSAGE=$(cat <<EOF
          <b>Wild KSU Build Failed</b> 🔴

          <b>Repository:</b> ${REPO}
          <b>Branch:</b> ${BRANCH}
          <b>Commit:</b> <a href="https://github.com/${REPO}/commit/${COMMIT_SHA}">${COMMIT_SHA:0:7}</a>
          <b>Workflow:</b> <a href="https://github.com/${REPO}/actions/runs/${RUN_ID}">View Run</a>

          <b>Commit Message:</b>
          ${COMMIT_MESSAGE}
          EOF
              )

          echo "Sending Failure Notification..."
          curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_USER_ID }}" \
            -d parse_mode="HTML" \
            --data-urlencode "text=$MESSAGE"







