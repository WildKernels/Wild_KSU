name: Kernel Build Check

on:
  workflow_dispatch:
    inputs:
      ksu_branch:
        description: Wild KSU branch/commit/tag to setup
        required: false
        default: dev
  push:
    branches:
      - dev
      - stable
    paths:
      - kernel/**
      - .github/workflows/build-kernel.yml
  pull_request:
    branches:
      - dev
      - stable
    paths:
      - kernel/**
      - .github/workflows/build-kernel.yml

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      KSU_BRANCH: ${{ inputs.ksu_branch || 'dev' }}
    strategy:
      fail-fast: false
      matrix:
        branch:
          - common-android12-5.10-lts
          - common-android13-5.10-lts
          - common-android13-5.15-lts
          - common-android14-5.15-lts
          - common-android14-6.1-2025-09
          - common-android14-6.1-lts
          - common-android15-6.6-lts
          - common-android16-6.12-lts

    steps:
      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@v3
        if: false
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: rmz
          rmz_version: "3.1.1"
          testing: false

      - name: Install repo tool
        run: |
          mkdir -p "$GITHUB_WORKSPACE/bin"
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o "$GITHUB_WORKSPACE/bin/repo"
          chmod +x "$GITHUB_WORKSPACE/bin/repo"
          echo "$GITHUB_WORKSPACE/bin" >> "$GITHUB_PATH"

      - name: Prepare kernel source
        run: |
          set -euxo pipefail
          mkdir -p "$GITHUB_WORKSPACE/android-kernel"
          cd "$GITHUB_WORKSPACE/android-kernel"
          repo init -u https://android.googlesource.com/kernel/manifest -b "${{ matrix.branch }}" --depth=1
          repo --trace sync -c -j"$(nproc --all)" --fail-fast --no-tags --force-sync --no-clone-bundle --optimized-fetch --prune --current-branch

      - name: Setup Wild KSU in source tree
        run: |
          set -euxo pipefail
          cd "$GITHUB_WORKSPACE/android-kernel"
          bash <(curl -LSs "https://raw.githubusercontent.com/WildKernels/Wild_KSU/dev/kernel/setup.sh") -p "$KSU_BRANCH"

      - name: Write KSU fragment
        run: |
          cat > "$GITHUB_WORKSPACE/android-kernel/wild_gki.fragment" << 'EOF'
          CONFIG_KSU=y
          EOF

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "CONFIG_KSU_PR_BUILD=y" >> "$GITHUB_WORKSPACE/android-kernel/wild_gki.fragment"
          fi

          if [[ "${{ matrix.branch }}" == common-android12-* ]] || \
             [[ "${{ matrix.branch }}" == common-android13-* ]] || \
             [[ "${{ matrix.branch }}" == common-android14-* ]]; then
            echo "ANDROID_VERSION=android14_or_lower" >> "$GITHUB_ENV"
          else
            echo "ANDROID_VERSION=other" >> "$GITHUB_ENV"
          fi

      - name: Clean Kernel Flags
        run: |
          set -euxo pipefail
          cd "$GITHUB_WORKSPACE/android-kernel/common"
          # Remove ABI protected exports to prevent Wifi & Bluetooth errors.
          rm -rf ./android/abi_gki_protected_exports_*
          perl -0pi -e 's/^\s*"protected_exports_list"\s*:\s*"android\/abi_gki_protected_exports_aarch64",\s*$//m' ./BUILD.bazel
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Make clean to remove dirty flags"
          
      - name: Build Kernel
        working-directory: ${{ github.workspace }}/android-kernel
        run: |
          set -exuo pipefail
          if [ -f "build/build.sh" ]; then
            SKIP_MRPROPER=1 GKI_DEFCONFIG_FRAGMENT="$GITHUB_WORKSPACE/android-kernel/wild_gki.fragment" LTO=thin BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh || exit 1
          else
            # Copy fragment to kernel tree for bazel
            cp "$GITHUB_WORKSPACE/android-kernel/wild_gki.fragment" common/arch/arm64/configs/wild_gki.fragment
            if [[ "$ANDROID_VERSION" == "android14_or_lower" ]]; then
              tools/bazel build --config=fast --defconfig_fragment=//common:arch/arm64/configs/wild_gki.fragment //common:kernel_aarch64_dist || exit 1
            else
              tools/bazel build --config=fast --defconfig_fragment=//common:arch/arm64/configs/wild_gki.fragment //common:kernel_aarch64_dist || exit 1
            fi
          fi

      - name: Verify build output
        run: |
          OUTDIR_FULL=$(echo "${{ matrix.branch }}" | sed 's/^common-//')
          OUTDIR_BASE=$(echo "$OUTDIR_FULL" | sed 's/-lts$//')

          if [ -f "$GITHUB_WORKSPACE/android-kernel/out/$OUTDIR_FULL/dist/Image" ] || \
             [ -f "$GITHUB_WORKSPACE/android-kernel/out/$OUTDIR_BASE/dist/Image" ] || \
             [ -f "$GITHUB_WORKSPACE/android-kernel/bazel-bin/common/kernel_aarch64/Image" ]; then
            echo "Kernel build succeeded for $OUTDIR_FULL"
          else
            echo "Kernel build output not found for $OUTDIR_FULL or $OUTDIR_BASE"
            exit 1
          fi

      - name: Clone AnyKernel3 (flash test only)
        run: |
          set -euxo pipefail
          git clone --depth 1 -b gki-2.0 https://github.com/WildKernels/AnyKernel3.git "$GITHUB_WORKSPACE/AnyKernel3"

      - name: Prepare AnyKernel3 Artifact (flash test only)
        run: |
          set -euxo pipefail
          OUTDIR_FULL=$(echo "${{ matrix.branch }}" | sed 's/^common-//')
          OUTDIR_BASE=$(echo "$OUTDIR_FULL" | sed 's/-lts$//')

          if [ -f "$GITHUB_WORKSPACE/android-kernel/out/$OUTDIR_FULL/dist/Image" ]; then
            cp "$GITHUB_WORKSPACE/android-kernel/out/$OUTDIR_FULL/dist/Image" "$GITHUB_WORKSPACE/AnyKernel3/Image"
          elif [ -f "$GITHUB_WORKSPACE/android-kernel/out/$OUTDIR_BASE/dist/Image" ]; then
            cp "$GITHUB_WORKSPACE/android-kernel/out/$OUTDIR_BASE/dist/Image" "$GITHUB_WORKSPACE/AnyKernel3/Image"
          elif [ -f "$GITHUB_WORKSPACE/android-kernel/bazel-bin/common/kernel_aarch64/Image" ]; then
            cp "$GITHUB_WORKSPACE/android-kernel/bazel-bin/common/kernel_aarch64/Image" "$GITHUB_WORKSPACE/AnyKernel3/Image"
          else
            echo "Error: Image file not found in any expected location"
            exit 1
          fi

      - name: Upload AnyKernel3 Artifact (flash test only)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.branch }}-AnyKernel3
          path: ${{ github.workspace }}/AnyKernel3
          if-no-files-found: error
          compression-level: 9
