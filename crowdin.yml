# Crowdin configuration file for Wild KSU Android project

# Project identifier
project_id: "wild-ksu"

# API token (should be set as environment variable CROWDIN_PERSONAL_TOKEN)
# api_token_env: "CROWDIN_PERSONAL_TOKEN"

# Base path for the project
base_path: "."

# Preserve hierarchy
preserve_hierarchy: true

# Files configuration
files:
  # Android strings.xml localization
  - source: "/manager/app/src/main/res/values/strings.xml"
    translation: "/manager/app/src/main/res/values-%android_code%/strings.xml"
    type: "android"
    
    # Language mapping for Android locale codes
    languages_mapping:
      android_code:
        # Common language mappings
        ar: "ar-rSA"          # Arabic (Saudi Arabia)
        bg: "bg-rBG"          # Bulgarian (Bulgaria)
        bn: "bn-rBD"          # Bengali (Bangladesh)
        de: "de-rDE"          # German (Germany)
        es: "es-rES"          # Spanish (Spain)
        fa: "fa-rIR"          # Persian (Iran)
        fr: "fr-rFR"          # French (France)
        hi: "hi-rIN"          # Hindi (India)
        hu: "hu-rHU"          # Hungarian (Hungary)
        id: "in-rID"          # Indonesian (Indonesia)
        it: "it-rIT"          # Italian (Italy)
        ja: "ja-rJP"          # Japanese (Japan)
        ko: "ko-rKR"          # Korean (South Korea)
        pl: "pl-rPL"          # Polish (Poland)
        pt-BR: "pt-rBR"       # Portuguese (Brazil)
        ru: "ru-rRU"          # Russian (Russia)
        sv: "sv-rSE"          # Swedish (Sweden)
        th: "th-rTH"          # Thai (Thailand)
        tr: "tr-rTR"          # Turkish (Turkey)
        uk: "uk-rUA"          # Ukrainian (Ukraine)
        vi: "vi-rVN"          # Vietnamese (Vietnam)
        zh-CN: "zh-rCN"       # Chinese Simplified (China)
        zh-TW: "zh-rTW"       # Chinese Traditional (Taiwan)

# Commit message for automated commits
commit_message: "New Crowdin updates"

# Append commit identifier
append_commit_id: false

# Export options
export_options:
  - export_only_approved: false
  - skip_untranslated_strings: false
  - skip_untranslated_files: false
  - export_approved_only: false
